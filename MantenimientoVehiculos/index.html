<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MantenimientoVehiculos — Control de Flota</title>
  <link rel="stylesheet" href="css/reset.css" />
  <link rel="stylesheet" href="css/variables.css" />
  <link rel="stylesheet" href="css/layout.css" />
  <link rel="stylesheet" href="css/components.css" />
  <link rel="stylesheet" href="css/responsive.css" />
</head>
<body>

  <header class="app-header">
    <a href="../index.html" style="color:inherit;text-decoration:none;opacity:.7;font-size:.85rem;white-space:nowrap;margin-right:var(--space-md)">← Volver</a>
    <div class="app-header__brand">
      <span class="app-header__brand-icon">🚗</span>
      <span>MantenimientoVehiculos</span>
    </div>
  </header>

  <nav class="app-tabs">
    <button class="app-tab app-tab--active" data-view="viewDashboard">📊 Dashboard</button>
    <button class="app-tab" data-view="viewVehicles">🚙 Vehículos</button>
  </nav>

  <!-- ===== DASHBOARD ===== -->
  <section class="app-view app-view--active" id="viewDashboard">

    <div class="dashboard-summary">
      <div class="card card--blue">
        <div class="card__label">Vehículos</div>
        <div class="card__value" style="color:var(--color-primary)" id="sumTotal">0</div>
      </div>
      <div class="card card--green">
        <div class="card__label">Sistemas Bueno</div>
        <div class="card__value" style="color:var(--status-bueno)" id="sumBueno">0</div>
      </div>
      <div class="card card--yellow">
        <div class="card__label">En Atención</div>
        <div class="card__value" style="color:var(--status-atencion)" id="sumAtencion">0</div>
      </div>
      <div class="card card--red">
        <div class="card__label">Críticos</div>
        <div class="card__value" style="color:var(--status-critico)" id="sumCritico">0</div>
      </div>
    </div>

    <div class="dashboard-alerts">
      <h3 style="font-size:var(--font-size-md);font-weight:700;margin-bottom:var(--space-sm);color:var(--color-text-secondary);text-transform:uppercase;letter-spacing:0.5px">Alertas</h3>
      <div id="alertsContainer"></div>
    </div>

    <div class="matrix-wrap">
      <h3 style="padding:var(--space-lg) var(--space-lg) 0;font-size:var(--font-size-md);font-weight:700;color:var(--color-text-secondary);text-transform:uppercase;letter-spacing:0.5px">Matriz de Estado — Vehículos vs Sistemas</h3>
      <div style="padding:var(--space-md) var(--space-lg) 0;display:flex;gap:var(--space-md);font-size:var(--font-size-sm);color:var(--color-text-secondary)">
        <span><span class="system-dot system-dot--bueno"></span> Bueno</span>
        <span><span class="system-dot system-dot--atencion"></span> Atención</span>
        <span><span class="system-dot system-dot--critico"></span> Crítico</span>
        <span><span class="system-dot system-dot--na"></span> Sin datos</span>
      </div>
      <table class="matrix-table">
        <thead><tr id="matrixHeader"></tr></thead>
        <tbody id="matrixBody"></tbody>
      </table>
    </div>
  </section>

  <!-- ===== VEHÍCULOS ===== -->
  <section class="app-view" id="viewVehicles">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:var(--space-lg)">
      <button class="btn btn--primary" id="btnNuevoVehiculo">+ Nuevo Vehículo</button>
    </div>
    <div class="vehicles-grid" id="vehiclesList"></div>
  </section>

  <!-- ===== MODAL: VEHÍCULO ===== -->
  <div class="modal-overlay" id="vehicleOverlay">
    <div class="modal">
      <div class="modal__header">
        <h2 class="modal__title" id="vehicleFormTitle">Nuevo Vehículo</h2>
        <button class="btn btn--secondary btn--sm" id="vehicleFormCancel">✕</button>
      </div>
      <form class="modal__body" id="vehicleForm">
        <div class="form-group">
          <label class="form-label" for="vehNombre">Nombre *</label>
          <input class="form-input" type="text" id="vehNombre" placeholder="Ej: Ford Transit 2020" maxlength="100" required />
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label" for="vehPlaca">Placa</label>
            <input class="form-input" type="text" id="vehPlaca" placeholder="ABC-123" maxlength="10" />
          </div>
          <div class="form-group">
            <label class="form-label" for="vehAnio">Año</label>
            <input class="form-input" type="number" id="vehAnio" placeholder="2020" min="1990" max="2030" />
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label" for="vehMarca">Marca</label>
            <input class="form-input" type="text" id="vehMarca" placeholder="Ford" />
          </div>
          <div class="form-group">
            <label class="form-label" for="vehModelo">Modelo</label>
            <input class="form-input" type="text" id="vehModelo" placeholder="Transit" />
          </div>
        </div>
        <div class="modal__footer" style="padding:var(--space-md) 0 0">
          <button type="button" class="btn btn--secondary" id="vehicleFormCancel2">Cancelar</button>
          <button type="submit" class="btn btn--primary" id="vehicleFormSubmit">Agregar</button>
        </div>
      </form>
    </div>
  </div>

  <!-- ===== MODAL: SISTEMAS ===== -->
  <div class="modal-overlay" id="systemsOverlay">
    <div class="modal">
      <div class="modal__header">
        <h2 class="modal__title" id="systemsFormTitle">Sistemas</h2>
        <button class="btn btn--secondary btn--sm" id="systemsCancel">✕</button>
      </div>
      <div class="modal__body">
        <div id="systemsList"></div>

        <form id="systemForm" style="display:none;margin-top:var(--space-md);padding-top:var(--space-md);border-top:2px solid var(--color-border)">
          <div class="form-group">
            <label class="form-label" id="sysNombreLabel">Sistema</label>
          </div>
          <div class="form-group">
            <label class="form-label">Estado</label>
            <div class="status-selector">
              <div class="status-option status-option--bueno" data-estado="bueno">
                <span class="system-dot system-dot--bueno"></span> Bueno
              </div>
              <div class="status-option status-option--atencion" data-estado="atencion">
                <span class="system-dot system-dot--atencion"></span> Atención
              </div>
              <div class="status-option status-option--critico" data-estado="critico">
                <span class="system-dot system-dot--critico"></span> Crítico
              </div>
            </div>
          </div>
          <div class="form-group">
            <label class="form-label" for="sysUltimaRevision">Última Revisión</label>
            <input class="form-input" type="date" id="sysUltimaRevision" />
          </div>
          <div class="form-group">
            <label class="form-label" for="sysNotas">Notas</label>
            <textarea class="form-textarea" id="sysNotas" placeholder="Observaciones..." maxlength="300"></textarea>
          </div>
          <div class="modal__footer" style="padding:var(--space-md) 0 0">
            <button type="button" class="btn btn--secondary" id="systemsCancel2">Volver</button>
            <button type="submit" class="btn btn--primary">Guardar</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <script src="js/utils.js"></script>
  <script src="js/store.js"></script>
  <script src="js/models.js"></script>
  <script src="js/dashboard.js"></script>
  <script src="js/systems.js"></script>
  <script src="js/vehicles.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
